<header class="site-header">
  <div class="container">
    <a href="{{ site.Home.RelPermalink }}" class="logo">
      <span class="logo-text">D. Hess <span class="accent">Media</span></span>
    </a>
    <nav class="main-nav">
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-list">
        {{ range site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if .URL | hasPrefix "#" }} class="scroll-link"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
